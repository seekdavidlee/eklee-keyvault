name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      enablePrivateNetworking:
        description: 'Enable private networking (VNET, private endpoints)'
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure with OIDC federated credentials
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set deployment variables
        id: vars
        run: |
          DEPLOYMENT_NAME="eklee-keyvault-$(date +%Y%m%d-%H%M%S)"
          echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          echo "deploymentName=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep template
        id: deploy
        run: |
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --template-file Deployment/main.bicep \
            --name "${{ steps.vars.outputs.deploymentName }}" \
            --parameters \
              environment=${{ steps.vars.outputs.environment }} \
              enablePrivateNetworking=${{ inputs.enablePrivateNetworking }}
